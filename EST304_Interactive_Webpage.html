<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsible AI — AI Index 2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:            #FCF6F5;
    --bg2:           #f0e8e7;
    --bg3:           #e6dede;
    --surface:       #ffffff;
    --surface2:      #f7f1f0;
    --border:        rgba(123,154,204,0.16);
    --border-mid:    rgba(123,154,204,0.30);
    --border-strong: rgba(123,154,204,0.48);
    --accent:        #7b9acc;
    --accent-dark:   #4e72a8;
    --accent-light:  #b4c9e6;
    --accent-faint:  rgba(123,154,204,0.08);
    --text:          #243050;
    --text-mid:      #4a5c7a;
    --text-muted:    #8898b8;
    --text-light:    #b0bdd4;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
  }

  /* ═══════ LAYOUT ═══════ */
  #app { display:flex; width:100%; height:100%; }

  #mindmap-pane {
    position:relative; flex-shrink:0;
    width:100%; height:100%;
    transition: width 0.65s cubic-bezier(0.77,0,0.175,1);
    overflow:hidden;
    background: var(--bg);
  }
  #app.panel-open #mindmap-pane { width:44%; }

  #detail-pane {
    flex-shrink:0; width:0; height:100%; overflow:hidden;
    background: var(--surface);
    border-left: 1.5px solid var(--border-mid);
    transition: width 0.65s cubic-bezier(0.77,0,0.175,1);
    display:flex; flex-direction:column;
    box-shadow: -5px 0 28px rgba(123,154,204,0.10);
  }
  #app.panel-open #detail-pane { width:56%; }

  /* ═══════ BACKGROUND WASH ═══════ */
  #mindmap-pane::before {
    content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse 60% 55% at 28% 26%, rgba(123,154,204,0.10) 0%, transparent 68%),
      radial-gradient(ellipse 45% 40% at 74% 74%, rgba(123,154,204,0.07) 0%, transparent 65%);
  }

  /* ═══════ HEADER ═══════ */
  #header {
    position:absolute; top:0; left:0; right:0; z-index:10;
    padding:22px 30px;
    display:flex; align-items:flex-start; justify-content:space-between;
    background: linear-gradient(180deg, rgba(252,246,245,0.97) 0%, rgba(252,246,245,0) 100%);
    pointer-events:none;
  }
  .brand-chapter {
    font-family:'Space Mono',monospace; font-size:9px;
    letter-spacing:2.5px; text-transform:uppercase;
    color:var(--accent-dark); opacity:0.82; margin-bottom:4px;
  }
  .brand-title {
    font-family:'Playfair Display',serif; font-size:19px; font-weight:700;
    color:var(--text); letter-spacing:-0.2px;
  }
  .header-tag {
    font-family:'Space Mono',monospace; font-size:9px;
    letter-spacing:1.5px; text-transform:uppercase;
    color:var(--text-muted); margin-top:4px;
  }

  /* ═══════ SVG ═══════ */
  #mindmap-svg { width:100%; height:100%; display:block; }

  .orbit-ring {
    fill:none; stroke:rgba(123,154,204,0.11); stroke-width:1; stroke-dasharray:5 10;
  }

  /* connections */
  .conn-line {
    fill:none; stroke-width:1.5;
    opacity:0.26;
    transition: opacity 0.3s, stroke-width 0.3s;
  }
  .conn-line.active  { opacity:0.72; stroke-width:2.5; }
  .conn-line.dimmed  { opacity:0.08; }

  /* center node */
  @keyframes pulse-ring {
    0%   { r:78px; opacity:0.45; }
    100% { r:120px; opacity:0; }
  }
  .center-pulse { fill:none; stroke:var(--accent); stroke-width:1; opacity:0; animation: pulse-ring 3.5s ease-out infinite; }
  .center-pulse-2 { animation-delay:1.75s; }

  .center-node { cursor:pointer; }
  .center-hover-ring { fill:none; stroke:var(--accent); stroke-width:1.5; opacity:0; transition:opacity 0.25s; }
  .center-node:hover .center-hover-ring { opacity:1; }

  /* topic nodes */
  .topic-node { cursor:pointer; }
  .node-shadow { fill:none; opacity:0; filter:blur(14px); transition:opacity 0.3s; }
  .topic-node:hover .node-shadow, .topic-node.active .node-shadow { opacity:0.4; }
  .node-fill { transition: r 0.25s ease; }
  .topic-node:hover .node-fill, .topic-node.active .node-fill { r:52px; }
  .node-ring { fill:none; stroke-width:1.7; opacity:0.55; transition:opacity 0.25s, stroke-width 0.25s; }
  .topic-node:hover .node-ring, .topic-node.active .node-ring { opacity:1; stroke-width:2.3; }
  .node-inner-ring { fill:none; stroke-width:1; opacity:0.18; transition:opacity 0.25s; }
  .topic-node:hover .node-inner-ring, .topic-node.active .node-inner-ring { opacity:0.48; }

  .node-num {
    font-family:'Space Mono',monospace; font-size:8.5px; font-weight:700;
    fill:var(--text-muted); text-anchor:middle;
  }
  .node-label-text {
    font-family:'DM Sans',sans-serif; font-size:9.5px; font-weight:600;
    fill:var(--text); text-anchor:middle; pointer-events:none;
  }

  /* hint */
  #hint {
    position:absolute; bottom:22px; left:50%; transform:translateX(-50%);
    font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2.5px;
    text-transform:uppercase; color:var(--text-muted);
    animation: blink-hint 3.5s ease-in-out infinite;
    pointer-events:none; white-space:nowrap; transition:opacity 0.4s;
  }
  #hint.hidden { opacity:0 !important; }
  @keyframes blink-hint { 0%,100%{opacity:0.32} 50%{opacity:0.75} }

  /* ═══════ DETAIL PANEL ═══════ */
  #detail-pane { position:relative; }
  #detail-close {
    position:absolute; top:18px; right:18px; z-index:20;
    width:34px; height:34px; border-radius:50%;
    background:var(--bg2); border:1.5px solid var(--border-mid);
    color:var(--text-muted); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:17px; line-height:1;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  #detail-close:hover { background:var(--accent-faint); border-color:var(--accent); color:var(--text); }

  #detail-scroll {
    flex:1; overflow-y:auto; padding:40px 38px 64px;
    scrollbar-width:thin; scrollbar-color:var(--border-mid) transparent;
  }
  #detail-scroll::-webkit-scrollbar { width:3px; }
  #detail-scroll::-webkit-scrollbar-thumb { background:var(--border-mid); border-radius:3px; }

  /* panel typography */
  .panel-eyebrow {
    font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2.5px;
    text-transform:uppercase; color:var(--accent-dark); opacity:0.8; margin-bottom:10px;
  }
  .panel-title {
    font-family:'Playfair Display',serif; font-size:26px; font-weight:700;
    line-height:1.22; color:var(--text); margin-bottom:6px;
  }
  .panel-rule { height:2.5px; width:44px; border-radius:2px; margin:16px 0 20px; }
  .panel-intro { font-size:13.5px; line-height:1.8; color:var(--text-mid); margin-bottom:28px; }

  /* stat cards */
  .stats-grid {
    display:grid; grid-template-columns:repeat(auto-fit,minmax(136px,1fr));
    gap:11px; margin-bottom:28px;
  }
  .stat-card {
    background:var(--surface2); border:1.5px solid var(--border);
    border-radius:14px; padding:17px 15px; position:relative; overflow:hidden;
  }
  .stat-card-bar { position:absolute; top:0; left:0; right:0; height:2.5px; border-radius:14px 14px 0 0; }
  .stat-num { font-family:'Playfair Display',serif; font-size:24px; font-weight:900; line-height:1; margin-bottom:7px; }
  .stat-desc { font-size:11px; color:var(--text-muted); line-height:1.45; }

  /* findings */
  .section-label {
    font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2px;
    text-transform:uppercase; color:var(--text-muted); margin-bottom:14px;
  }
  .finding { display:flex; gap:13px; padding:14px 0; border-bottom:1px solid var(--border); }
  .finding:last-child { border-bottom:none; }
  .finding-idx { font-family:'Space Mono',monospace; font-size:10.5px; font-weight:700; min-width:22px; padding-top:2px; opacity:0.75; }
  .finding-body { font-size:13px; line-height:1.68; color:var(--text-mid); }
  .finding-body strong { color:var(--text); font-weight:600; }

  /* nav */
  .panel-nav { display:flex; gap:10px; margin-top:30px; padding-top:20px; border-top:1px solid var(--border); }
  .nav-btn {
    flex:1; padding:13px 10px;
    background:var(--surface2); border:1.5px solid var(--border); border-radius:10px;
    color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:12px;
    cursor:pointer; text-align:center;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }
  .nav-btn:hover { color:var(--text); border-color:var(--accent); background:var(--accent-faint); }
  .nav-dir { font-size:9px; letter-spacing:1px; opacity:0.45; display:block; margin-bottom:2px; font-family:'Space Mono',monospace; }

  /* ── fade-in ── */
  @keyframes fade-in-up {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .fade-in { animation: fade-in-up 0.45s ease both; }

  @media (max-width:768px) {
    #app.panel-open #mindmap-pane { width:0; }
    #app.panel-open #detail-pane  { width:100%; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- ══════════════════════════ LEFT PANE ══════════════════════════ -->
  <div id="mindmap-pane">
    <div id="header">
      <div>
        <div class="brand-chapter">AI Index 2025 · Chap 3</div>
        <div class="brand-title">Responsible AI</div>
      </div>
      <div class="header-tag">Interactive Explorer</div>
    </div>

    <svg id="mindmap-svg" viewBox="0 0 800 700" preserveAspectRatio="xMidYMid meet">
      <defs>
        <radialGradient id="cg" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#eef3fb"/>
          <stop offset="100%" stop-color="#dce8f5"/>
        </radialGradient>
        <filter id="soft-drop" x="-30%" y="-30%" width="160%" height="160%">
          <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="rgba(123,154,204,0.20)"/>
        </filter>
      </defs>

      <!-- orbit rings -->
      <circle class="orbit-ring" cx="400" cy="350" r="186"/>
      <circle class="orbit-ring" cx="400" cy="350" r="238"/>

      <!-- connection lines -->
      <g id="connections"></g>

      <!-- CENTER NODE -->
      <g class="center-node" id="center-node" transform="translate(400,350)">
        <circle class="center-pulse"   r="78"/>
        <circle class="center-pulse center-pulse-2" r="78"/>
        <circle r="78" fill="url(#cg)" filter="url(#soft-drop)"/>
        <circle r="78" fill="none" stroke="var(--accent)" stroke-width="1.5" opacity="0.52"/>
        <circle class="center-hover-ring" r="88"/>
        <text font-family="'Playfair Display',serif" font-size="14" font-weight="700"
              fill="var(--text)" text-anchor="middle" y="-9">Responsible</text>
        <text font-family="'Playfair Display',serif" font-size="14" font-weight="700"
              fill="var(--text)" text-anchor="middle" y="10">AI</text>
      </g>

      <!-- TOPIC NODES -->
      <g id="nodes"></g>
    </svg>

    <div id="hint">↗ Click any node to explore</div>
  </div>

  <!-- ══════════════════════════ RIGHT PANE ══════════════════════════ -->
  <div id="detail-pane">
    <button id="detail-close" title="Close">×</button>
    <div id="detail-scroll"></div>
  </div>
</div>

<script>
/* ════════════════════════════
   TOPIC DATA
════════════════════════════ */
const TOPICS = [
  {
    id:1, label:'Assessing\nRAI', short:'Assessing Responsible AI',
    color:'#7b9acc',
    intro:'Evaluating AI systems against responsible AI criteria remains uncommon, but new benchmarks are beginning to fill the gap. Meanwhile, AI incident reports hit a record high in 2024, signaling broader deployment and growing public awareness.',
    stats:[
      {num:'233',   desc:'AI incidents reported in 2024 — a record high'},
      {num:'56.4%', desc:'Year-over-year increase in reported incidents'},
      {num:'New',   desc:'HELM Safety & AIR-Bench benchmarks now available'},
    ],
    findings:[
      {text:'<strong>Benchmark gap narrows:</strong> New tools like HELM Safety and AIR-Bench address the long-standing lack of standardized RAI benchmarks for LLMs flagged in last year\'s Index.'},
      {text:'<strong>Incidents at record levels:</strong> The AI Incidents Database recorded 233 incidents in 2024 — a 56.4% jump over 2023 — spanning facial recognition misidentification, deepfake harassment, and chatbot-related mental health crises.'},
      {text:'<strong>Factuality benchmarks evolve:</strong> Earlier tools like HaluEval and TruthfulQA failed to gain traction. Newer evaluations — FACTS, SimpleQA, and the HHEM leaderboard — offer more rigorous and widely-used measurement.'},
      {text:'<strong>Election misinformation went global:</strong> AI-generated misinformation appeared in 12+ countries and on 10+ platforms during 2024 elections. Direct electoral impact remains hard to quantify.'},
    ]
  },
  {
    id:2, label:'RAI in\nOrganizations', short:'RAI in Organizations & Business',
    color:'#8fabd4',
    intro:'Businesses increasingly recognize responsible AI risks but often stop short of meaningful action. A significant gap separates risk acknowledgment from risk mitigation across corporate AI adoption.',
    stats:[
      {num:'64%', desc:'Organizations citing inaccuracy as a top RAI concern'},
      {num:'63%', desc:'Citing regulatory compliance as a concern'},
      {num:'Gap',  desc:'Persists between identifying and mitigating risks'},
    ],
    findings:[
      {text:'<strong>Awareness outpaces action:</strong> A McKinsey survey shows that while many organizations identify key RAI risks — inaccuracy (64%), regulatory compliance (63%), cybersecurity (60%) — few are taking systematic steps to address them.'},
      {text:'<strong>Governance structures maturing slowly:</strong> Some leading firms have established AI ethics boards and red-teaming protocols, but adoption remains uneven across sectors and company sizes.'},
      {text:'<strong>Regulatory pressure accelerates formalization:</strong> The EU AI Act and similar legislation are pushing organizations to codify RAI practices — especially for high-risk applications in hiring, credit, and healthcare.'},
      {text:'<strong>Third-party risk awareness grows:</strong> Organizations increasingly recognize that vendor-supplied AI components introduce RAI risks, prompting calls for standardized supply chain due diligence.'},
    ]
  },
  {
    id:3, label:'RAI in\nAcademia', short:'RAI in Academia',
    color:'#6b93c2',
    intro:'Academic interest in Responsible AI is accelerating. RAI papers at top venues grew nearly 29% in 2024, reflecting a sustained structural shift in how the research community prioritizes safety and ethics.',
    stats:[
      {num:'+28.8%', desc:'Increase in RAI papers at top AI conferences in 2024'},
      {num:'1,278',  desc:'RAI papers accepted at leading conferences in 2024'},
      {num:'2019+',  desc:'Continuous annual growth in RAI research since 2019'},
    ],
    findings:[
      {text:'<strong>RAI research growing fast:</strong> Accepted RAI papers at major venues rose from 992 in 2023 to 1,278 in 2024 — a 28.8% jump, continuing a steady annual upward trend since 2019.'},
      {text:'<strong>Structural shift, not a spike:</strong> Sustained multi-year growth indicates RAI has become a core research priority rather than a passing trend driven by media attention.'},
      {text:'<strong>Interdisciplinary research expands:</strong> RAI scholarship increasingly bridges computer science, law, ethics, and social science — producing more holistic analyses of AI\'s societal impact.'},
      {text:'<strong>Dedicated tracks expanding:</strong> Flagship AI conferences are growing their RAI workshop and track offerings, creating space for empirical, theoretical, and policy-oriented contributions.'},
    ]
  },
  {
    id:4, label:'RAI\nPolicymaking', short:'RAI Policymaking',
    color:'#a0b8d8',
    intro:'Governments and international bodies accelerated RAI governance in 2024. Global cooperation on AI principles intensified, producing sweeping new frameworks — though implementation and enforcement remain uneven.',
    stats:[
      {num:'4+',     desc:'Major global bodies releasing RAI frameworks in 2024'},
      {num:'60+',    desc:'Countries with national AI strategies referencing RAI'},
      {num:'Rising', desc:'Urgency for enforcement mechanisms worldwide'},
    ],
    findings:[
      {text:'<strong>International frameworks proliferate:</strong> The OECD, EU, UN, and African Union each published RAI frameworks in 2024, with shared emphasis on transparency, explainability, and trustworthiness.'},
      {text:'<strong>EU AI Act enters enforcement:</strong> The EU\'s landmark risk-tiered regulation began phased implementation, establishing binding obligations for high-risk AI systems and influencing global norms.'},
      {text:'<strong>National strategies multiply:</strong> Over 60 countries now have national AI strategies referencing responsible AI principles — up from fewer than 30 five years prior.'},
      {text:'<strong>Enforcement infrastructure lags:</strong> While policy frameworks abound, the dedicated regulators, auditing standards, and redress mechanisms needed to enforce them remain underdeveloped in most jurisdictions.'},
    ]
  },
  {
    id:5, label:'Privacy &\nData Gov.', short:'Privacy & Data Governance',
    color:'#7b9acc',
    intro:'The data commons underpinning AI training is rapidly shrinking. Restrictions on web data scraping surged in 2024, threatening data diversity, model alignment, and the scalability of future AI systems.',
    stats:[
      {num:'20–33%', desc:'Restricted tokens in C4 dataset (2024) up from 5–7%'},
      {num:'Sharp ↑', desc:'In robots.txt & ToS restrictions banning AI training'},
      {num:'Risk',   desc:'To diversity, alignment & scalability of AI models'},
    ],
    findings:[
      {text:'<strong>Data commons shrinking fast:</strong> Restrictions on AI training data in actively-maintained C4 domains jumped from 5–7% to 20–33% of tokens between 2023 and 2024 — a dramatic acceleration.'},
      {text:'<strong>Publishers erecting new barriers:</strong> News organizations, social platforms, and publishers deploy robots.txt rules and Terms of Service clauses explicitly barring AI training scrapes.'},
      {text:'<strong>Downstream model risks multiply:</strong> Reduced access to diverse public data threatens alignment (fewer perspectives), scalability (smaller corpora), and geographic/linguistic representation.'},
      {text:'<strong>New learning paradigms needed:</strong> Researchers are exploring synthetic data, licensing markets, and few-shot learning methods to compensate for the shrinking open training data ecosystem.'},
    ]
  },
  {
    id:6, label:'Fairness\n& Bias', short:'Fairness & Bias',
    color:'#8fabd4',
    intro:'Despite explicit bias-reduction measures, advanced LLMs continue to exhibit implicit biases around race and gender. Benchmark scores improve on paper, but real-world bias in AI-mediated decisions persists.',
    stats:[
      {num:'Implicit', desc:'Bias documented in GPT-4, Claude 3 Sonnet & others'},
      {num:'Racial',   desc:'Negative term associations with Black individuals persist'},
      {num:'Gender',   desc:'Women under-linked to STEM; men favored for leadership'},
    ],
    findings:[
      {text:'<strong>Explicit measures insufficient:</strong> Advanced LLMs including GPT-4 and Claude 3 Sonnet were designed to curb explicit bias but continue to exhibit implicit associations — disproportionately linking negative terms with Black individuals.'},
      {text:'<strong>STEM gender stereotyping persists:</strong> Models more often associate women with humanities and men with STEM and leadership roles — reinforcing occupational stereotypes in career-sensitive contexts.'},
      {text:'<strong>Benchmark improvements mislead:</strong> Standard bias benchmarks show progress, but may fail to capture the full range of biases that emerge in real-world deployment and edge cases.'},
      {text:'<strong>Intersectional bias under-studied:</strong> Most evaluations examine race and gender in isolation; research on intersectional identities remains limited and is flagged as a key gap.'},
    ]
  },
  {
    id:7, label:'Transparency &\nExplainability', short:'Transparency & Explainability',
    color:'#6b93c2',
    intro:'Foundation model transparency is improving but remains incomplete. The Foundation Model Transparency Index score among major developers climbed from 37% to 58% in one year — promising progress with ample room to grow.',
    stats:[
      {num:'58%',   desc:'Avg. transparency score among major developers (May 2024)'},
      {num:'37%',   desc:'Score in October 2023 — a 21-point gain in months'},
      {num:'Still', desc:'Considerable room for improvement across all dimensions'},
    ],
    findings:[
      {text:'<strong>Transparency scores rising:</strong> The Foundation Model Transparency Index found average scores rose from 37% to 58% across major AI developers — driven by improved disclosure of model capabilities and deployment practices.'},
      {text:'<strong>Training data disclosure gaps remain:</strong> Many developers still do not fully disclose training data composition, governance practices, or content filtering steps taken before training.'},
      {text:'<strong>Interpretability research advances:</strong> Mechanistic interpretability and concept-based explanation methods are advancing — though scaling to frontier model sizes remains an open challenge.'},
      {text:'<strong>Regulatory pressure accelerating disclosure:</strong> The EU AI Act and U.S. executive guidance require technical documentation from developers, creating compliance-driven incentives for greater openness.'},
    ]
  },
  {
    id:8, label:'Security\n& Safety', short:'Security & Safety',
    color:'#a0b8d8',
    intro:'AI security and safety evaluation is advancing, but adversarial threats evolve alongside defenses. Jailbreaking, prompt injection, and agentic AI risks are growing areas of concern requiring sustained research.',
    stats:[
      {num:'HELM',   desc:'Safety & AIR-Bench emerging as standard evaluation frameworks'},
      {num:'Active', desc:'Red-teaming now a baseline practice at frontier AI labs'},
      {num:'↑ Risk', desc:'Threat surface growing with agentic and multimodal AI'},
    ],
    findings:[
      {text:'<strong>New safety benchmarks gain traction:</strong> HELM Safety and AIR-Bench have emerged as meaningful frameworks for evaluating model safety — filling a gap that persisted throughout prior years.'},
      {text:'<strong>Jailbreaking remains unsolved:</strong> Despite RLHF and Constitutional AI techniques, adversarial prompts continue to elicit unsafe outputs — requiring continuous red-teaming and patching cycles.'},
      {text:'<strong>Agentic AI expands the threat surface:</strong> As AI systems autonomously browse the web, write code, and call APIs, the risk surface for security failures and misuse escalates significantly.'},
      {text:'<strong>Compositional safety risks emerge:</strong> In multi-model pipelines, safety vulnerabilities can cascade — prompting new research into how safety properties hold across model compositions.'},
    ]
  },
  {
    id:9, label:'Special\nTopics', short:'Special Topics on RAI',
    color:'#7b9acc',
    intro:'Chapter 3 closes with two frontier RAI topics: the emerging risks of autonomous LM agents, and the documented spread of AI-generated election misinformation across the globe in 2024.',
    stats:[
      {num:'10+',  desc:'Social media platforms with AI election misinformation'},
      {num:'12+',  desc:'Countries experiencing AI-related election interference'},
      {num:'New',  desc:'Research on jailbreaking multimodal agents published'},
    ],
    findings:[
      {text:'<strong>Agentic AI introduces new risk classes:</strong> Research using LM-simulated sandboxes identified novel risks from autonomous agents — including unintended side-effects, goal misgeneralization, and multi-step harm execution.'},
      {text:'<strong>Multimodal agents vulnerable to image attacks:</strong> New research shows a single adversarial image can jailbreak multimodal LM agents — highlighting safety challenges at the intersection of vision and language.'},
      {text:'<strong>Election misinformation spread globally:</strong> AI-generated misinformation was documented in 12+ countries and 10+ platforms during 2024 elections — though directly attributable shifts in electoral outcomes remain hard to measure.'},
      {text:'<strong>Regulatory response to deepfakes accelerates:</strong> Multiple jurisdictions enacted laws in 2024 requiring disclosure of AI-generated political content and criminalizing non-consensual AI-generated intimate imagery.'},
    ]
  },
];

/* ════════════════════════════
   POSITION NODES
════════════════════════════ */
const CX = 400, CY = 350, R = 208;
TOPICS.forEach((t, i) => {
  const angle = (i / TOPICS.length) * 2 * Math.PI - Math.PI / 2;
  t.x = CX + R * Math.cos(angle);
  t.y = CY + R * Math.sin(angle);
});

/* ════════════════════════════
   DRAW CONNECTIONS
════════════════════════════ */
const connG = document.getElementById('connections');
TOPICS.forEach(t => {
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  const mx = (CX + t.x) / 2, my = (CY + t.y) / 2 - 12;
  path.setAttribute('d', `M ${CX} ${CY} Q ${mx} ${my} ${t.x} ${t.y}`);
  path.setAttribute('class', 'conn-line');
  path.setAttribute('stroke', t.color);
  path.id = `conn-${t.id}`;
  connG.appendChild(path);
});

/* ════════════════════════════
   DRAW TOPIC NODES
════════════════════════════ */
const nodesG = document.getElementById('nodes');
TOPICS.forEach(t => {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('class', 'topic-node');
  g.setAttribute('transform', `translate(${t.x},${t.y})`);
  g.id = `node-${t.id}`;

  const shadow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  shadow.setAttribute('class','node-shadow'); shadow.setAttribute('r','52');
  shadow.setAttribute('fill', t.color); g.appendChild(shadow);

  const fill = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  fill.setAttribute('class','node-fill'); fill.setAttribute('r','48');
  fill.setAttribute('fill','#FCF6F5'); fill.setAttribute('stroke', t.color);
  fill.setAttribute('stroke-width','1.8'); g.appendChild(fill);

  const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  ring.setAttribute('class','node-ring'); ring.setAttribute('r','48');
  ring.setAttribute('fill','none'); ring.setAttribute('stroke', t.color); g.appendChild(ring);

  const iring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  iring.setAttribute('class','node-inner-ring'); iring.setAttribute('r','38');
  iring.setAttribute('fill','none'); iring.setAttribute('stroke', t.color); g.appendChild(iring);

  const num = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  num.setAttribute('class','node-num'); num.setAttribute('y','-28');
  num.textContent = String(t.id).padStart(2,'0'); g.appendChild(num);

  const lines = t.label.split('\n');
  const lineH = 13.5, totalH = lines.length * lineH;
  lines.forEach((ln, li) => {
    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    txt.setAttribute('class','node-label-text');
    txt.setAttribute('y', -totalH / 2 + li * lineH + lineH / 2 + 3);
    txt.textContent = ln; g.appendChild(txt);
  });

  g.addEventListener('click', () => openTopic(t.id));
  nodesG.appendChild(g);
});

/* ════════════════════════════
   CENTER NODE → CHAPTER SUMMARY
════════════════════════════ */

  `;

/* ════════════════════════════
   OPEN TOPIC
════════════════════════════ */
let currentId = null;
function openTopic(id) {
  const t = TOPICS.find(x => x.id === id);
  if (!t) return;
  currentId = id;

  document.querySelectorAll('.topic-node').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.conn-line').forEach(l => { l.classList.remove('active'); l.classList.add('dimmed'); });
  document.getElementById(`node-${id}`).classList.add('active');
  const ac = document.getElementById(`conn-${id}`);
  ac.classList.remove('dimmed'); ac.classList.add('active');

  document.getElementById('app').classList.add('panel-open');
  document.getElementById('hint').classList.add('hidden');

  const prev = TOPICS[(id - 2 + 9) % 9];
  const next = TOPICS[id % 9];

  const statsHTML = t.stats.map(s => `
    <div class="stat-card">
      <div class="stat-card-bar" style="background:${t.color}"></div>
      <div class="stat-num" style="color:${t.color}">${s.num}</div>
      <div class="stat-desc">${s.desc}</div>
    </div>`).join('');

  const findingsHTML = t.findings.map((f, i) => `
    <div class="finding">
      <span class="finding-idx" style="color:${t.color}">•</span>
      <span class="finding-body">${f.text}</span>
    </div>`).join('');

  document.getElementById('detail-scroll').innerHTML = `
    <div class="fade-in">
      <div class="panel-eyebrow">Topic ${String(t.id).padStart(2,'0')} / 09 · AI Index 2025 · Ch.3</div>
      <h2 class="panel-title">${t.short}</h2>
      <div class="panel-rule" style="background:${t.color}"></div>
      <p class="panel-intro">${t.intro}</p>
      <div class="stats-grid">${statsHTML}</div>
      <div class="section-label">Key Findings</div>
      <div>${findingsHTML}</div>
      <div class="panel-nav">
        <button class="nav-btn" onclick="openTopic(${prev.id})">
          <span class="nav-dir">← PREV</span>${prev.short}
        </button>
        <button class="nav-btn" onclick="openTopic(${next.id})">
          <span class="nav-dir">NEXT →</span>${next.short}
        </button>
      </div>
    </div>
  `;
  document.getElementById('detail-scroll').scrollTop = 0;
}

/* ════════════════════════════
   CLOSE
════════════════════════════ */
document.getElementById('detail-close').addEventListener('click', () => {
  document.getElementById('app').classList.remove('panel-open');
  document.querySelectorAll('.topic-node').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.conn-line').forEach(l => l.classList.remove('active','dimmed'));
  document.getElementById('hint').classList.remove('hidden');
  currentId = null;
});

/* ════════════════════════════
   RESPONSIVE VIEWBOX
════════════════════════════ */
function resizeSVG() {
  const pane = document.getElementById('mindmap-pane');
  document.getElementById('mindmap-svg').setAttribute('viewBox',
    pane.offsetWidth < 420 ? '120 140 560 420' : '0 0 800 700');
}
window.addEventListener('resize', resizeSVG);
document.getElementById('app').addEventListener('transitionend', resizeSVG);
resizeSVG();
</script>
